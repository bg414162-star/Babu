<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABS Studio - Content Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root {
            --abs-gold: #fbbf24;
        }

        body,
        html {
            height: 100%;
            overflow: hidden;
        }

        .editor-sidebar {
            width: 400px;
            height: 100vh;
            overflow-y: auto;
            background: #09090b;
            border-right: 2px solid #1f2937;
        }

        .preview-window {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            background: #f4f4f5;
        }

        /* Scrollbar Styling */
        .editor-sidebar::-webkit-scrollbar {
            width: 5px;
        }

        .editor-sidebar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }

        /* Preview Specific Styles */
        #previewFrame .dynamic-gold {
            color: var(--abs-gold);
        }

        #previewFrame .dynamic-bg-gold {
            background-color: var(--abs-gold);
        }

        #previewFrame .dynamic-border-gold {
            border-color: var(--abs-gold);
        }
    </style>
</head>

<body class="flex">

    <aside class="editor-sidebar p-6 text-white shadow-2xl z-50">
        <div class="mb-10 flex items-center gap-3 border-b border-zinc-800 pb-5">
            <div class="bg-amber-400 text-black p-2 rounded-lg font-black text-xs">ABS</div>
            <h2 class="text-xl font-black tracking-tighter italic">BUILDER STUDIO</h2>
        </div>

        <div class="mb-8">
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">1. Brand Identity</p>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Marketplace Name</label>
                    <input id="inName" type="text" oninput="syncPreview()" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-amber-400">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Logo URL</label>
                    <input id="inLogo" type="text" oninput="syncPreview()" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-amber-400">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1">Theme Primary Color</label>
                    <input id="inColor" type="color" oninput="syncPreview()" class="w-full h-10 bg-zinc-800 border border-zinc-700 rounded-xl cursor-pointer p-1">
                </div>
            </div>
        </div>

        <div class="mb-8 border-t border-zinc-800 pt-6">
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">2. Hero Banner</p>
            <div class="space-y-4">
                <input id="inHeroTitle" type="text" oninput="syncPreview()" placeholder="Hero Main Title" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-amber-400">
                <textarea id="inHeroDesc" oninput="syncPreview()" placeholder="Hero Description" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded-xl text-sm outline-none focus:border-amber-400 h-24"></textarea>
            </div>
        </div>

        <div class="mb-8 border-t border-zinc-800 pt-6">
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">3. Products</p>
            <button onclick="addProduct()" class="w-full bg-zinc-700 py-3 rounded-xl text-xs font-bold hover:bg-zinc-600 transition mb-4 uppercase">
                + Add New Product
            </button>
            <div id="productEditList" class="space-y-3">
            </div>
        </div>

        <button onclick="saveToDatabase()" class="w-full bg-amber-400 text-black font-black py-4 rounded-2xl shadow-lg shadow-amber-400/20 sticky bottom-0 hover:scale-105 transition active:scale-95">
            PUBLISH LIVE 🚀
        </button>
    </aside>

    <section class="preview-window relative" id="previewFrame">

        <header class="bg-zinc-900 text-white p-4 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <img id="prevLogo" src="" class="h-10 w-10 rounded-full border-2 dynamic-border-gold object-cover">
                <span id="prevName" class="font-black text-xl uppercase">Golden Wing</span>
            </div>
            <div class="flex gap-6 text-sm font-bold uppercase tracking-widest">
                <span>Shop</span>
                <div class="relative"><i class="fa-solid fa-cart-shopping"></i></div>
            </div>
        </header>

        <section id="prevHero" class="h-[400px] bg-zinc-800 flex items-center px-12 text-white relative">
            <div class="z-10 relative">
                <h1 id="prevHeroTitle" class="text-5xl font-black mb-4 uppercase leading-none">Built Above The Standard</h1>
                <p id="prevHeroDesc" class="text-zinc-400 max-w-lg mb-8">Loading standard content...</p>
                <button class="dynamic-bg-gold text-black px-8 py-3 rounded-full font-black text-xs uppercase tracking-widest">Shop Now</button>
            </div>
            <div class="absolute inset-0 bg-black/40"></div>
        </section>

        <main class="p-10">
            <div class="flex items-center justify-between mb-10">
                <h2 class="text-2xl font-black uppercase tracking-tighter">Marketplace Preview</h2>
                <div class="h-1 w-12 dynamic-bg-gold"></div>
            </div>
            <div id="prevGrid" class="grid grid-cols-2 gap-8">
            </div>
        </main>

    </section>

    <script>
        // --- DATABASE ---
        let config = JSON.parse(localStorage.getItem('abs_master')) || {
            siteName: "Golden Wing",
            logo: "https://i.ibb.co/vz6mXmP/abs-logo.jpg",
            color: "#fbbf24",
            heroTitle: "BUILT ABOVE THE STANDARD",
            heroDesc: "India's premium curated marketplace. Selected by Babu (SMIT Berhampur)."
        };

        let products = JSON.parse(localStorage.getItem('abs_prod_list')) || [{
            name: "Realme P3 5G",
            price: "17999",
            img: "https://picsum.photos/id/160/400/400"
        }];

        // --- INITIALIZE EDITOR VALUES ---
        function initEditor() {
            document.getElementById('inName').value = config.siteName;
            document.getElementById('inLogo').value = config.logo;
            document.getElementById('inColor').value = config.color;
            document.getElementById('inHeroTitle').value = config.heroTitle;
            document.getElementById('inHeroDesc').value = config.heroDesc;
            syncPreview();
        }

        // --- SYNC ENGINE (REAL TIME) ---
        function syncPreview() {
            // 1. Update Config from Inputs
            config.siteName = document.getElementById('inName').value;
            config.logo = document.getElementById('inLogo').value;
            config.color = document.getElementById('inColor').value;
            config.heroTitle = document.getElementById('inHeroTitle').value;
            config.heroDesc = document.getElementById('inHeroDesc').value;

            // 2. Apply to Right Side (Preview)
            document.getElementById('prevName').innerText = config.siteName;
            document.getElementById('prevLogo').src = config.logo;
            document.getElementById('prevHeroTitle').innerText = config.heroTitle;
            document.getElementById('prevHeroDesc').innerText = config.heroDesc;

            // Theme Color Apply
            document.documentElement.style.setProperty('--abs-gold', config.color);

            renderPreviewProducts();
            renderEditorProductList();
        }

        function renderPreviewProducts() {
            const grid = document.getElementById('prevGrid');
            grid.innerHTML = products.map(p => `
        <div class="bg-white p-3 rounded-[2rem] shadow-sm border border-zinc-200">
          <img src="${p.img}" class="h-40 w-full object-cover rounded-[1.5rem] mb-4">
          <div class="px-2">
            <h3 class="font-black text-sm uppercase mb-1">${p.name}</h3>
            <p class="text-amber-500 font-black">₹${p.price}</p>
          </div>
        </div>
      `).join('');
        }

        function renderEditorProductList() {
            const list = document.getElementById('productEditList');
            list.innerHTML = products.map((p, i) => `
        <div class="bg-zinc-800/50 p-3 rounded-xl border border-zinc-700 text-xs flex justify-between items-center">
          <span class="truncate pr-2">${p.name}</span>
          <div class="flex gap-2">
            <button onclick="editProductPrompt(${i})" class="text-blue-400"><i class="fa-solid fa-pen"></i></button>
            <button onclick="removeProduct(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
      `).join('');
        }

        // --- PRODUCT ACTIONS ---
        function addProduct() {
            const name = prompt("Product Name:");
            const price = prompt("Price:");
            const img = prompt("Image URL:", "https://picsum.photos/400/400");
            if (name && price) {
                products.unshift({
                    name,
                    price,
                    img
                });
                syncPreview();
            }
        }

        function removeProduct(i) {
            products.splice(i, 1);
            syncPreview();
        }

        function editProductPrompt(i) {
            const newName = prompt("Edit Name:", products[i].name);
            if (newName) {
                products[i].name = newName;
                syncPreview();
            }
        }

        // --- FINAL PUBLISH ---
        function saveToDatabase() {
            localStorage.setItem('abs_master', JSON.stringify(config));
            localStorage.setItem('abs_prod_list', JSON.stringify(products));
            alert("🎉 PUBLISHED! Babu Boss, aapka data save ho gaya hai.");
        }

        // Start Studio
        initEditor();

        <
        div class = "mb-8 border-t border-zinc-800 pt-6" >
            <
            p class = "text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4" > 4. Share Your Website < /p> <
        div class = "bg-zinc-900 p-4 rounded-xl border border-zinc-800" >
            <
            label class = "text-[10px] text-zinc-500 block mb-2 uppercase" > Your Public URL < /label> <
        div class = "flex gap-2" >
            <
            input id = "publicLink"
        type = "text"
        readonly value = "https://golden-wing-abs.web.app/babu-store"
        class = "w-full bg-black text-amber-400 text-xs p-2 rounded border border-zinc-700 outline-none" >
            <
            button onclick = "copyLink()"
        class = "bg-zinc-700 px-3 rounded hover:bg-amber-400 hover:text-black transition" >
            <
            i class = "fa-solid fa-copy" > < /i> < /
        button > <
            /div> <
        p class = "text-[9px] text-zinc-600 mt-2 italic" > Boss, ise copy karke doston ko bhej sakte ho! < /p> < /
        div > <
            /div>
    </script>
</body>

</html>
